<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>VenueMap — Visitor View</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      color: #333;
      font-size: 16px;
    }

    #error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      color: #dc2626;
      font-size: 16px;
    }

    /* GPS blue dot */
    .gps-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2563eb;
      border: 3px solid white;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.5);
    }

    .gps-dot-pulse {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(37, 99, 235, 0.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s ease-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    /* Debug info (click-to-test) */
    #debug {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 300px;
    }

    #debug .label { font-weight: 600; color: #333; }
    #debug .value { color: #666; font-family: monospace; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="loading">Loading map...</div>
  <div id="error"></div>

  <div id="debug">
    <div><span class="label">Click map to test GPS mapping</span></div>
    <div id="debug-geo" class="value"></div>
    <div id="debug-pixel" class="value"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
